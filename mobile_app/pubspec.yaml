name: stock_management_app
description: Mobile Stock & Project Management Application
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # State management
  provider: ^6.1.1
  
  # HTTP requests
  http: ^1.1.2
  dio: ^5.4.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^13.0.0
  
  # Forms & validation (simplifié pour éviter les conflits)
  # flutter_form_builder: ^9.1.1
  # form_builder_validators: ^9.1.0
  
  # Date & time
  intl: ^0.20.2
  
  # Loading & dialogs
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4

  # File picker (for image selection)
  file_picker: ^8.0.0

  # SVG support
  flutter_svg: ^2.0.10+1

  # Open Google Maps / browser links (store location)
  url_launcher: ^6.2.5

  # PDF export (project reports)
  pdf: ^3.11.1
  printing: ^5.13.4
  arabic_reshaper: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

