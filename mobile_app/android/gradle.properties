# Single worker + enough Metaspace for AGP/Kotlin (192m caused OOM: Metaspace)
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError -Dkotlin.daemon.jvm.options=-Xmx512m
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.workers.max=1
android.useAndroidX=true
